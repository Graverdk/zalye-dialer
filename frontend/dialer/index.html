<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zalye Dialer</title>
    <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0.13.1/dist/index.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .header-icon { font-size: 18px; }
        .header-title { font-weight: 600; font-size: 14px; }
        .header-subtitle { font-size: 11px; opacity: 0.8; }
        .content { flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 12px; overflow: hidden; }
        .person-banner { background: #f0f7ff; border: 1px solid #c8e0ff; border-radius: 8px; padding: 8px 12px; display: none; }
        .person-name { font-weight: 600; font-size: 13px; color: #1a73e8; }
        .person-sub { font-size: 11px; color: #666; }
        .input-group { display: flex; gap: 8px; }
        .phone-input { flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-weight: 500; letter-spacing: 1px; outline: none; transition: border-color 0.2s; }
        .phone-input:focus { border-color: #1a73e8; }
        .phone-input::placeholder { font-size: 13px; font-weight: 400; letter-spacing: 0; color: #aaa; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-call { background: #4caf50; color: white; flex: 1; justify-content: center; }
        .btn-hangup { background: #f44336; color: white; flex: 1; justify-content: center; display: none; }
        .btn-clear { background: #f5f5f5; color: #666; padding: 10px 12px; }
        .status-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 80px; }
        .status-icon { font-size: 40px; }
        .status-text { font-size: 14px; font-weight: 500; color: #555; text-align: center; }
        .call-timer { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; color: #333; display: none; }
        .toast { position: fixed; bottom: 8px; left: 8px; right: 8px; background: #323232; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center; }
        .toast.show { opacity: 1; }
        .debug { font-size: 9px; font-family: monospace; color: #888; max-height: 40px; overflow: hidden; line-height: 1.3; flex-shrink: 0; }
        body.calling .btn-call { display: none; }
        body.calling .btn-hangup { display: flex; }
        body.calling .status-icon { display: none; }
        body.calling .status-text { display: none; }
        body.calling .call-timer { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-icon">&#128222;</span>
        <div>
            <div class="header-title">Zalye Dialer</div>
            <div class="header-subtitle">Via Relatel</div>
        </div>
    </div>
    <div class="content">
        <div class="person-banner" id="personBanner">
            <div class="person-name" id="personName"></div>
            <div class="person-sub" id="personSub"></div>
        </div>
        <div class="input-group">
            <input class="phone-input" id="phoneInput" type="tel" placeholder="Indtast telefonnummer..." />
            <button class="btn btn-clear" id="btnClear" title="Ryd">&#10006;</button>
        </div>
        <div class="input-group">
            <button class="btn btn-call" id="btnCall" disabled>&#128222; Ring op</button>
            <button class="btn btn-hangup" id="btnHangup">&#128308; L&#230;g p&#229;</button>
        </div>
        <div class="status-area">
            <div class="status-icon" id="statusIcon">&#128242;</div>
            <div class="status-text" id="statusText">Venter p&#229; opkald...</div>
            <div class="call-timer" id="callTimer">00:00</div>
        </div>
        <div class="debug" id="debug"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        var sdk = null, callActive = false, callInterval = null, callSecs = 0;
        var personId = null, dealId = null;
        var phoneInput = document.getElementById('phoneInput');
        var btnCall = document.getElementById('btnCall');
        var btnHangup = document.getElementById('btnHangup');
        var btnClear = document.getElementById('btnClear');
        var statusText = document.getElementById('statusText');
        var callTimer = document.getElementById('callTimer');
        var personBanner = document.getElementById('personBanner');
        var personName = document.getElementById('personName');
        var personSub = document.getElementById('personSub');
        var toast = document.getElementById('toast');
        var debugEl = document.getElementById('debug');

        function log(m) { console.log('[ZD] ' + m); debugEl.textContent = m; }
        function showToast(m) { toast.textContent = m; toast.classList.add('show'); setTimeout(function() { toast.classList.remove('show'); }, 3000); }
        function pad(n) { return n < 10 ? '0' + n : '' + n; }

        phoneInput.addEventListener('input', function() {
            btnCall.disabled = !phoneInput.value.trim();
            if (phoneInput.value.trim()) statusText.textContent = 'Klar til at ringe';
        });
        btnClear.addEventListener('click', function() {
            phoneInput.value = '';
            btnCall.disabled = true;
            statusText.textContent = 'Venter pĺ opkald...';
            personBanner.style.display = 'none';
            personId = null; dealId = null;
        });

        function setPhone(phone, name, sub) {
            phoneInput.value = phone || '';
            btnCall.disabled = !phone;
            if (phone) statusText.textContent = 'Klar til at ringe';
            if (name) {
                personName.textContent = name;
                personSub.textContent = sub || '';
                personBanner.style.display = 'block';
            }
        }

        function startCall() {
            if (!phoneInput.value.trim() || callActive) return;
            callActive = true;
            document.body.classList.add('calling');
            callSecs = 0;
            callTimer.textContent = '00:00';
            callInterval = setInterval(function() { callSecs++; callTimer.textContent = pad(Math.floor(callSecs/60)) + ':' + pad(callSecs%60); }, 1000);
            var number = phoneInput.value.trim();
            log('Kalder ' + number);
            fetch('/api/calls/initiate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ toNumber: number, personId: personId || undefined, dealId: dealId || undefined })
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.error) { showToast('Fejl: ' + d.error); endCall(); }
                else { showToast('&#9989; Opkald igangsat!'); log('Kaldet ' + number); }
            }).catch(function(e) { showToast('Fejl: ' + e.message); endCall(); });
        }

        function endCall() {
            callActive = false;
            document.body.classList.remove('calling');
            if (callInterval) { clearInterval(callInterval); callInterval = null; }
        }

        btnCall.addEventListener('click', startCall);
        btnHangup.addEventListener('click', endCall);
        phoneInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') startCall(); });

        function initSDK() {
            log('Init SDK...');
            try {
                var SDK = window.AppExtensionsSDK;
                if (typeof SDK !== 'function') { log('SDK ikke fundet'); return; }
                sdk = new SDK();
                sdk.initialize({ size: { height: 420, width: 360 } }).then(function() {
                    log('SDK OK');
                    // Get context to auto-fill phone
                    sdk.getContext().then(function(ctx) {
                        log('Context: ' + JSON.stringify(ctx).substring(0, 100));
                        var data = ctx && (ctx.data || ctx);
                        if (data) {
                            // Try to extract phone from person data
                            var phone = data.phoneNumber || (data.person && data.person.phone && (Array.isArray(data.person.phone) ? (data.person.phone.find(function(p){return p.primary;})||data.person.phone[0]||{}).value : data.person.phone)) || null;
                            var name = data.personName || (data.person && data.person.name) || null;
                            var pId = data.personId || (data.person && data.person.id) || null;
                            var dId = data.dealId || (data.deal && data.deal.id) || null;
                            personId = pId; dealId = dId;
                            if (phone) setPhone(phone, name, pId ? 'Person ID: ' + pId : '');
                            else if (name) { personName.textContent = name; personSub.textContent = 'Ingen telefon registreret'; personBanner.style.display = 'block'; }
                        }
                    }).catch(function(e) { log('Context fejl: ' + e.message); });

                    // Listen for VISIBILITY (phone number clicks)
                    sdk.listen({ event: 'VISIBILITY', callback: function(data) {
                        log('VISIBILITY: ' + JSON.stringify(data).substring(0, 100));
                        if (data && data.is_visible) {
                            var ctx = data.context || data;
                            var phone = ctx.phoneNumber || ctx.phone || null;
                            var name = ctx.personName || ctx.name || null;
                            personId = ctx.personId || null;
                            dealId = ctx.dealId || null;
                            if (phone) setPhone(phone, name, '');
                        }
                    }});
                }).catch(function(e) { log('SDK fejl: ' + e.message); });
            } catch(e) { log('Exception: ' + e.message); }
        }

        initSDK();
    </script>
</body>
</html>
