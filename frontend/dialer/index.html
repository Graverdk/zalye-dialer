<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zalye Dialer</title>
    <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon { font-size: 20px; }
        .header-title { font-weight: 600; font-size: 15px; }
        .header-subtitle { font-size: 11px; opacity: 0.8; }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 16px;
        }
        .phone-display {
            font-size: 22px;
            font-weight: 600;
            color: #1a73e8;
            letter-spacing: 1px;
            min-height: 32px;
        }
        .status-icon { font-size: 48px; }
        .status-text {
            font-size: 15px;
            font-weight: 500;
            color: #555;
        }
        .status-hint {
            font-size: 12px;
            color: #999;
        }
        .call-timer {
            font-size: 24px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #333;
            display: none;
        }
        .actions {
            padding: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-call {
            background: #4caf50;
            color: white;
        }
        .btn-call:hover { background: #43a047; }
        .btn-call:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-hangup {
            background: #f44336;
            color: white;
            display: none;
        }
        .btn-hangup:hover { background: #e53935; }
        .btn-close {
            background: #e0e0e0;
            color: #555;
        }
        .btn-close:hover { background: #d5d5d5; }
        .person-info {
            font-size: 13px;
            color: #666;
            display: none;
        }
        .error-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            max-width: 280px;
            text-align: center;
        }
        .debug-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 4px 8px;
            max-height: 60px;
            overflow-y: auto;
            display: none;
        }
        /* States */
        body.state-calling .status-icon,
        body.state-calling .status-text,
        body.state-calling .status-hint { display: none; }
        body.state-calling .call-timer { display: block; }
        body.state-calling .btn-call { display: none; }
        body.state-calling .btn-hangup { display: flex; }
        body.state-calling .btn-close { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-icon">&#128222;</span>
        <div>
            <div class="header-title">Zalye Dialer</div>
            <div class="header-subtitle">Via Relatel</div>
        </div>
    </div>

    <div class="content">
        <div class="phone-display" id="phoneDisplay">-</div>
        <div class="person-info" id="personInfo"></div>
        <div class="status-icon">&#128242;</div>
        <div class="status-text" id="statusText">Venter p&#229; opkald...</div>
        <div class="status-hint" id="statusHint">Klik p&#229; et telefonnummer i Pipedrive</div>
        <div class="call-timer" id="callTimer">00:00</div>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="actions">
        <button class="btn btn-call" id="btnCall" disabled>
            <span>&#128222;</span> Ring op
        </button>
        <button class="btn btn-hangup" id="btnHangup">
            <span>&#128308;</span> L&#230;g p&#229;
        </button>
        <button class="btn btn-close" id="btnClose">
            <span>&#10006;</span> Luk
        </button>
    </div>

    <div class="debug-log" id="debugLog"></div>

    <script>
        // State
        var currentPhone = null;
        var currentPersonId = null;
        var currentDealId = null;
        var callActive = false;
        var callTimerInterval = null;
        var callSeconds = 0;
        var sdk = null;

        // Elements
        var phoneDisplay = document.getElementById('phoneDisplay');
        var personInfo = document.getElementById('personInfo');
        var statusText = document.getElementById('statusText');
        var statusHint = document.getElementById('statusHint');
        var callTimer = document.getElementById('callTimer');
        var btnCall = document.getElementById('btnCall');
        var btnHangup = document.getElementById('btnHangup');
        var btnClose = document.getElementById('btnClose');
        var errorMsg = document.getElementById('errorMsg');
        var debugLog = document.getElementById('debugLog');

        function log(msg) {
            console.log('[ZalyeDialer] ' + msg);
            if (debugLog) {
                debugLog.style.display = 'block';
                debugLog.textContent += msg + '\n';
                debugLog.scrollTop = debugLog.scrollHeight;
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(function() { errorMsg.style.display = 'none'; }, 5000);
        }

        function formatTime(secs) {
            var m = Math.floor(secs / 60);
            var s = secs % 60;
            return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
        }

        function setPhoneNumber(phone, name) {
            currentPhone = phone;
            phoneDisplay.textContent = phone || '-';
            btnCall.disabled = !phone;
            if (phone) {
                statusText.textContent = 'Klar til at ringe';
                statusHint.textContent = '';
            }
            if (name) {
                personInfo.textContent = name;
                personInfo.style.display = 'block';
            }
            log('Telefonnummer sat: ' + phone + (name ? ' (' + name + ')' : ''));
        }

        // Initialize Pipedrive SDK
        function initSDK() {
            log('Initialiserer SDK...');
            try {
                var AppExtensionsSDK = window.AppExtensionsSDK;
                if (!AppExtensionsSDK) {
                    log('FEJL: AppExtensionsSDK ikke fundet paa window');
                    return;
                }

                sdk = new AppExtensionsSDK.default({ identifier: 'zalye-dialer' });

                sdk.initialize({ size: { height: 400, width: 350 } }).then(function() {
                    log('SDK initialiseret OK');

                    // Listen for VISIBILITY events (phone number clicks)
                    sdk.listen({
                        event: 'VISIBILITY',
                        callback: function(data) {
                            log('VISIBILITY event: ' + JSON.stringify(data));
                            if (data && data.is_visible) {
                                // Extract phone from context
                                var context = data.context || data;
                                var phone = context.phoneNumber || context.phone || context.number || null;
                                var personId = context.personId || context.person_id || null;
                                var dealId = context.dealId || context.deal_id || null;
                                var name = context.personName || context.person_name || context.name || null;

                                if (phone) {
                                    currentPersonId = personId;
                                    currentDealId = dealId;
                                    setPhoneNumber(phone, name);
                                }
                            }
                        }
                    });

                    // Also try listening for CONTEXT_UPDATE
                    try {
                        sdk.listen({
                            event: 'CONTEXT_UPDATE',
                            callback: function(data) {
                                log('CONTEXT_UPDATE: ' + JSON.stringify(data));
                                if (data && data.phoneNumber) {
                                    setPhoneNumber(data.phoneNumber, data.personName || null);
                                    currentPersonId = data.personId || null;
                                    currentDealId = data.dealId || null;
                                }
                            }
                        });
                    } catch(e) {
                        log('CONTEXT_UPDATE listener not available: ' + e.message);
                    }

                    // Get initial context
                    sdk.getContext().then(function(context) {
                        log('Initial context: ' + JSON.stringify(context));
                        if (context && context.phoneNumber) {
                            setPhoneNumber(context.phoneNumber, context.personName || null);
                            currentPersonId = context.personId || null;
                            currentDealId = context.dealId || null;
                        }
                    }).catch(function(e) {
                        log('getContext fejl: ' + e.message);
                    });

                }).catch(function(err) {
                    log('SDK init fejl: ' + (err.message || err));
                });

            } catch(e) {
                log('SDK exception: ' + e.message);
            }
        }

        // Initiate call via backend API
        function initiateCall() {
            if (!currentPhone || callActive) return;

            log('Starter opkald til ' + currentPhone);
            callActive = true;
            document.body.classList.add('state-calling');
            callSeconds = 0;
            callTimer.textContent = '00:00';
            callTimerInterval = setInterval(function() {
                callSeconds++;
                callTimer.textContent = formatTime(callSeconds);
            }, 1000);

            var body = { toNumber: currentPhone };
            if (currentPersonId) body.personId = currentPersonId;
            if (currentDealId) body.dealId = currentDealId;

            fetch('/api/calls/initiate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                log('Opkald svar: ' + JSON.stringify(data));
                if (data.error) {
                    showError('Fejl: ' + data.error);
                    endCall();
                }
            })
            .catch(function(err) {
                log('Opkald fejl: ' + err.message);
                showError('Kunne ikke starte opkald');
                endCall();
            });
        }

        function endCall() {
            callActive = false;
            document.body.classList.remove('state-calling');
            if (callTimerInterval) {
                clearInterval(callTimerInterval);
                callTimerInterval = null;
            }
        }

        function closeDialer() {
            if (sdk) {
                try {
                    sdk.execute('HIDE_FLOATING_WINDOW');
                } catch(e) {
                    log('Kunne ikke lukke: ' + e.message);
                }
            }
        }

        // Event listeners
        btnCall.addEventListener('click', initiateCall);
        btnHangup.addEventListener('click', endCall);
        btnClose.addEventListener('click', closeDialer);

        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSDK);
        } else {
            initSDK();
        }
    </script>
</body>
</html>
